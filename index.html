<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neurosidekick · Acceso</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Lora:ital,wght@0,500;0,600;1,400&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --rosa:#eb177e; --verde:#009e6a; --rosa-claro:#faa8d0;
    --rosa-crema:#f3e9e8; --verde-agua:#e9f7f3; --gris:#4a4a4a; --blanco:#fff;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Montserrat',sans-serif; color:var(--gris);
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding:24px;
    background:radial-gradient(circle at 20% 20%, var(--verde-agua), transparent 55%),
               radial-gradient(circle at 80% 80%, #fde3f0, transparent 55%),
               var(--rosa-crema);
  }
  .card{
    background:var(--blanco); border-radius:28px; max-width:420px; width:100%;
    padding:44px 38px 38px; text-align:center;
    box-shadow:0 18px 50px rgba(235,23,126,.16);
    animation:pop .5s cubic-bezier(.2,.8,.3,1.2);
  }
  @keyframes pop{from{opacity:0;transform:translateY(14px) scale(.97)}to{opacity:1;transform:none}}
  .lock{
    width:72px;height:72px;margin:0 auto 18px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:32px;
    background:linear-gradient(135deg,var(--rosa),var(--rosa-claro));color:#fff;
    box-shadow:0 8px 22px rgba(235,23,126,.32);
  }
  .eyebrow{font-family:'Caveat',cursive;font-size:1.5rem;color:var(--verde);line-height:1;}
  h1{font-family:'Lora',serif;font-size:1.55rem;margin:2px 0 6px;color:#2c2c2c;}
  p.sub{font-size:.92rem;color:#7a7a7a;margin-bottom:22px;}
  form{display:flex;flex-direction:column;gap:12px;}
  input{
    font-family:'Montserrat',sans-serif;font-size:1.05rem;text-align:center;
    padding:14px 16px;border:2px solid #efd7e4;border-radius:14px;outline:none;
    transition:border-color .2s, box-shadow .2s; letter-spacing:.05em;
  }
  input:focus{border-color:var(--rosa);box-shadow:0 0 0 4px rgba(235,23,126,.12);}
  button{
    font-family:'Montserrat',sans-serif;font-weight:700;font-size:1.02rem;color:#fff;
    padding:14px;border:none;border-radius:14px;cursor:pointer;letter-spacing:.02em;
    background:linear-gradient(135deg,var(--rosa),#ff4fa3);
    box-shadow:0 8px 20px rgba(235,23,126,.3);transition:transform .15s, box-shadow .15s;
  }
  button:hover{transform:translateY(-2px);box-shadow:0 12px 26px rgba(235,23,126,.38);}
  button:active{transform:translateY(0);}
  button:disabled{opacity:.6;cursor:wait;transform:none;}
  .msg{min-height:20px;font-size:.86rem;margin-top:4px;}
  .msg.err{color:var(--rosa);}
  .foot{margin-top:22px;font-size:.78rem;color:#b3a9ad;}
  .foot b{color:var(--verde);font-weight:600;}
  .shake{animation:shake .4s;}
  @keyframes shake{0%,100%{transform:none}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="lock">🧠</div>
    <div class="eyebrow">Neurosidekick</div>
    <h1>Neuroeducación en Acción</h1>
    <p class="sub">Este espacio es para participantes del curso.<br>Introduce tu clave de acceso.</p>
    <form id="f" autocomplete="off">
      <input id="k" type="password" placeholder="Tu clave" aria-label="Clave de acceso" autofocus>
      <button id="b" type="submit">Entrar</button>
    </form>
    <div class="msg" id="m"></div>
    <div class="foot">Cerebro, corazón y movimiento ·<br><b>Carlota López-Peredo</b></div>
  </div>

const SS_KEY = "nsk_clave";          // clave guardada en la sesion
const card = document.getElementById('card');
const form = document.getElementById('f');
const inp  = document.getElementById('k');
const btn  = document.getElementById('b');
const msg  = document.getElementById('m');

function b64ToBytes(b64){
  const bin = atob(b64); const out = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) out[i] = bin.charCodeAt(i);
  return out;
}

async function descifrar(clave){
  if(!window.crypto || !window.crypto.subtle){
    throw new Error("NO_CRYPTO");
  }
  const salt = b64ToBytes(PAYLOAD.salt);
  const iv   = b64ToBytes(PAYLOAD.iv);
  const data = b64ToBytes(PAYLOAD.ct);
  const baseKey = await crypto.subtle.importKey(
    "raw", new TextEncoder().encode(clave), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    {name:"PBKDF2", salt, iterations:PAYLOAD.iters, hash:"SHA-256"},
    baseKey, {name:"AES-GCM", length:256}, false, ["decrypt"]);
  const plain = await crypto.subtle.decrypt({name:"AES-GCM", iv}, key, data);
  return new TextDecoder().decode(plain);
}

function render(html){
  document.open();
  document.write(html);
  document.close();
}

async function intentar(clave, desdeForm){
  try{
    const html = await descifrar(clave);
    sessionStorage.setItem(SS_KEY, clave);   // recordar para el resto de paginas
    render(html);
    return true;
  }catch(e){
    if(e.message === "NO_CRYPTO"){
      msg.className = "msg err";
      msg.textContent = "Abre esta página desde el enlace publicado (https), no desde el archivo local.";
      return false;
    }
    if(desdeForm){
      msg.className = "msg err";
      msg.textContent = "Clave incorrecta. Inténtalo de nuevo.";
      card.classList.remove('shake'); void card.offsetWidth; card.classList.add('shake');
      inp.value = ""; inp.focus();
    }
    return false;
  }
}

// Si ya desbloqueamos antes en esta sesion, entra solo (sin pedir clave)
(async ()=>{
  const guardada = sessionStorage.getItem(SS_KEY);
  if(guardada){ await intentar(guardada, false); }
})();

form.addEventListener('submit', async (e)=>{
  e.preventDefault();
  const clave = inp.value.trim();
  if(!clave) return;
  btn.disabled = true; btn.textContent = "Abriendo…"; msg.textContent = "";
  await intentar(clave, true);
  btn.disabled = false; btn.textContent = "Entrar";
});
</script>
